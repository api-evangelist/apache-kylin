naftiko: 1.0.0-alpha2
info:
  label: Apache Kylin REST API — Tables
  description: 'Apache Kylin REST API — Tables. 1 operations. Lead operation: Apache kylin Apache Kylin List Tables. Self-contained
    Naftiko capability covering one Apache Kylin business surface.'
  tags:
  - Apache Kylin
  - Tables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_KYLIN_API_KEY: APACHE_KYLIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-tables
    baseUri: http://localhost:7070/kylin/api
    description: Apache Kylin REST API — Tables business capability. Self-contained, no shared references.
    resources:
    - name: tables
      path: /tables
      operations:
      - name: listtables
        method: GET
        description: Apache kylin Apache Kylin List Tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project
          in: query
          type: string
          required: true
        - name: ext
          in: query
          type: boolean
    authentication:
      type: basic
      username: '{{env.APACHE_KYLIN_USER}}'
      password: '{{env.APACHE_KYLIN_PASS}}'
  exposes:
  - type: rest
    namespace: rest-tables-rest
    port: 8080
    description: REST adapter for Apache Kylin REST API — Tables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tables
      name: tables
      description: REST surface for tables.
      operations:
      - method: GET
        name: listtables
        description: Apache kylin Apache Kylin List Tables
        call: rest-tables.listtables
        with:
          project: rest.project
          ext: rest.ext
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-tables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Kylin REST API — Tables. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apache-kylin-apache-kylin-list
      description: Apache kylin Apache Kylin List Tables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-tables.listtables
      with:
        project: tools.project
        ext: tools.ext
      outputParameters:
      - type: object
        mapping: $.
