naftiko: 1.0.0-alpha2
info:
  label: Apache Kylin REST API — Jobs
  description: 'Apache Kylin REST API — Jobs. 4 operations. Lead operation: Apache kylin Apache Kylin List Jobs. Self-contained
    Naftiko capability covering one Apache Kylin business surface.'
  tags:
  - Apache Kylin
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_KYLIN_API_KEY: APACHE_KYLIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-jobs
    baseUri: http://localhost:7070/kylin/api
    description: Apache Kylin REST API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: Apache kylin Apache Kylin List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectName
          in: query
          type: string
        - name: status
          in: query
          type: integer
          description: Job status code (0=READY, 1=RUNNING, 2=ERROR, 4=STOPPED, 8=FINISHED, 32=DISCARDED)
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    - name: jobs-jobId
      path: /jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Apache kylin Apache Kylin Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    - name: jobs-jobId-cancel
      path: /jobs/{jobId}/cancel
      operations:
      - name: canceljob
        method: PUT
        description: Apache kylin Apache Kylin Cancel Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    - name: jobs-jobId-resume
      path: /jobs/{jobId}/resume
      operations:
      - name: resumejob
        method: PUT
        description: Apache kylin Apache Kylin Resume Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.APACHE_KYLIN_USER}}'
      password: '{{env.APACHE_KYLIN_PASS}}'
  exposes:
  - type: rest
    namespace: rest-jobs-rest
    port: 8080
    description: REST adapter for Apache Kylin REST API — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: Apache kylin Apache Kylin List Jobs
        call: rest-jobs.listjobs
        with:
          projectName: rest.projectName
          status: rest.status
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Apache kylin Apache Kylin Get Job
        call: rest-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}/cancel
      name: jobs-jobid-cancel
      description: REST surface for jobs-jobId-cancel.
      operations:
      - method: PUT
        name: canceljob
        description: Apache kylin Apache Kylin Cancel Job
        call: rest-jobs.canceljob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}/resume
      name: jobs-jobid-resume
      description: REST surface for jobs-jobId-resume.
      operations:
      - method: PUT
        name: resumejob
        description: Apache kylin Apache Kylin Resume Job
        call: rest-jobs.resumejob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache Kylin REST API — Jobs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apache-kylin-apache-kylin-list
      description: Apache kylin Apache Kylin List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-jobs.listjobs
      with:
        projectName: tools.projectName
        status: tools.status
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-kylin-apache-kylin-get
      description: Apache kylin Apache Kylin Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-kylin-apache-kylin-cancel
      description: Apache kylin Apache Kylin Cancel Job
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-jobs.canceljob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-kylin-apache-kylin-resume
      description: Apache kylin Apache Kylin Resume Job
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-jobs.resumejob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
