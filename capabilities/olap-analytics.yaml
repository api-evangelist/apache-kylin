naftiko: "1.0.0-alpha1"

info:
  label: "Apache Kylin OLAP Analytics"
  description: "Workflow capability for data analysts and BI engineers to execute OLAP queries, manage projects, and monitor cube build jobs in Apache Kylin."
  tags:
    - Apache Kylin
    - Big Data Analytics
    - Business Intelligence
    - OLAP
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      KYLIN_PASSWORD: KYLIN_PASSWORD

capability:
  consumes:
    - import: kylin-rest-api
      location: ./shared/kylin-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: kylin-olap-analytics-api
      description: "Unified REST API for Apache Kylin OLAP analytics."
      resources:
        - path: /v1/query
          name: query
          operations:
            - method: POST
              name: execute-query
              call: "kylin-rest-api.execute-query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          operations:
            - method: GET
              name: list-projects
              call: "kylin-rest-api.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/jobs
          name: jobs
          operations:
            - method: GET
              name: list-jobs
              call: "kylin-rest-api.list-jobs"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: kylin-olap-analytics-mcp
      transport: http
      description: "MCP server for AI-assisted Apache Kylin OLAP analytics."
      tools:
        - name: execute-sql-query
          description: Execute a SQL query on Apache Kylin to retrieve OLAP analytics results
          hints:
            readOnly: true
            openWorld: true
          call: "kylin-rest-api.execute-query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: List all Kylin projects and their configurations
          hints:
            readOnly: true
            openWorld: true
          call: "kylin-rest-api.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-models
          description: List data models in a Kylin project
          hints:
            readOnly: true
            openWorld: true
          call: "kylin-rest-api.list-models"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: List cube build jobs and their statuses
          hints:
            readOnly: true
            openWorld: true
          call: "kylin-rest-api.list-jobs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-job
          description: Cancel a running Kylin cube build job
          hints:
            readOnly: false
            destructive: false
          call: "kylin-rest-api.cancel-job"
          outputParameters:
            - type: object
              mapping: "$."
