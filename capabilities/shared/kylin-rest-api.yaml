naftiko: "1.0.0-alpha1"

info:
  label: "Apache Kylin REST API"
  description: "Shared per-API capability for the Apache Kylin REST API covering SQL queries, project management, and job management."
  tags:
    - Apache Kylin
    - Big Data Analytics
    - OLAP
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      KYLIN_PASSWORD: KYLIN_PASSWORD

capability:
  consumes:
    - type: http
      namespace: kylin-rest-api
      baseUri: http://localhost:7070/kylin/api
      description: "Apache Kylin REST API"
      authentication:
        type: basic
        username: ADMIN
        password: "{{KYLIN_PASSWORD}}"
      resources:
        - name: query
          path: /query
          description: SQL query execution
          operations:
            - name: execute-query
              method: POST
              description: Execute SQL query
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: projects
          path: /projects
          description: Project management
          operations:
            - name: list-projects
              method: GET
              description: List all projects
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jobs
          path: /jobs
          description: Job management
          operations:
            - name: list-jobs
              method: GET
              description: List build jobs
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: kylin-api-exposed
      resources:
        - path: /v1/query
          operations:
            - method: POST
              name: execute-query
              call: "kylin-rest-api.execute-query"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: kylin-api-mcp
      transport: http
      tools:
        - name: execute-sql-query
          description: Execute a SQL query on Apache Kylin
          hints:
            readOnly: true
          call: "kylin-rest-api.execute-query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: List all Kylin projects
          hints:
            readOnly: true
          call: "kylin-rest-api.list-projects"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: List Kylin build jobs
          hints:
            readOnly: true
          call: "kylin-rest-api.list-jobs"
          outputParameters:
            - type: object
              mapping: "$."
