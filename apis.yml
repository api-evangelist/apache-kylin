aid: apache-kylin
name: Apache Kylin
description: Apache Kylin is an open-source distributed analytics engine designed to provide a SQL interface and multi-dimensional
  analysis (OLAP) on large-scale datasets. It provides sub-second query latency on trillion-record datasets via pre-computed
  cubes and works on top of Hadoop, Spark, and cloud storage.
