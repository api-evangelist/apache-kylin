openapi: 3.0.3
info:
  title: Apache Kylin REST Authentication Tables API
  description: REST API for Apache Kylin OLAP engine providing SQL queries, model management, cube management, job management, and project administration.
  version: 5.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    email: dev@kylin.apache.org
servers:
- url: http://localhost:7070/kylin/api
  description: Apache Kylin server
security:
- basicAuth: []
tags:
- name: Tables
  description: Table and datasource management
paths:
  /tables:
    get:
      operationId: listTables
      summary: Apache kylin Apache Kylin List Tables
      description: List all tables loaded in a project.
      tags:
      - Tables
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      parameters:
      - name: project
        in: query
        required: true
        schema:
          type: string
        example: learn_kylin
      - name: ext
        in: query
        schema:
          type: boolean
        example: true
      responses:
        '200':
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Table'
              examples:
                listTables200Example:
                  summary: Default listTables 200 response
                  x-microcks-default: true
                  value: {}
components:
  schemas:
    Table:
      type: object
      description: A Kylin table
      properties:
        name:
          type: string
          example: KYLIN_SALES
        columns:
          type: array
          items:
            type: object
        cardinality:
          type: object
        exd:
          type: object
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
